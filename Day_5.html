<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <title></title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class=" d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
        <img src="https://tse3.mm.bing.net/th/id/OIP.c2mM1ZkzOlxhYtugBEUU5QHaHa?pid=Api&P=0&h=220" class="img-fluid rounded-circle" style="width: 30px; height: 30px;" alt="">
        <h3 class="mb-0">Caller Profiles</h3>
        </div>
        <button type="button" class="btn text-white mt-4 shadow"
            style="background-color: orange;">
            + Add contact
        </button>
    </div>
    </div>
    <p class="ps-1 ">Creat realistic contacts for your fake calls and texts.</p>

    <div class="border rounded-2 p-3 m-3 shadow">
    <h6 class="fw-bold">New Contact</h6>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
            <label class="form-label" style="font-size: 14px;">Full Name</label>
            <input type="text" class="form-control p-2 bg-light" style="font-size: 15px;" placeholder="e.g, Sarah Mitchell">
            <label class="form-label pt-2" style="font-size: 14px;">Relationship</label><br>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Boss</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Family</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Roommat</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Best Friend</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Doctor</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Coworker</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Partner</button>
            <button type="button" class="btn btn-sm" style="background-color: rgb(242, 240, 240); border-radius: 15px; font-size: 12px;">Neighbor</button>
          
</div>
            <div class="col-md-6">
            <label class="form-label" style="font-size: 14px;">Phone Number</label>
            <input type="text" class="form-control p-2 bg-light" style="font-size: 14px;" placeholder="(555) 123-4567"> 
            <label class="form-label pt-2" style="font-size: 14px;">Initials (Avatar)</label>
            <input type="text" class="form-control p-2 bg-light" style="font-size: 14px;" placeholder="SM"> 
          <div class="mt-4 text-end "><span style="font-size: 12px;"> Cancel <button type="button" class="btn text-white btn-sm ms-3 " style="background-color: rgb(193, 187, 187) ; border-radius: 10px;"> ✓ Creat Contact</button></span></div>
        
        </div>
        </div>
    </div>
    

</body>
</html>
